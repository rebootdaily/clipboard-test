<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#17324d" />
  <title>Clipboard v5.0b Sketch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Clipboard</strong>
      <span class="version">v5.0b</span>
    </div>
    <button id="toolsBtn" class="ghost">Tools</button>
  </header>

  <main class="app-shell">
    <section class="sketch-card">
      <div class="status-row">
        <span id="modeBadge" class="badge">Sketch</span>
        <span id="closureText">Start a new footprint</span>
      </div>
      <svg id="sketch" viewBox="0 0 1000 700" aria-label="Property sketch canvas"></svg>
    </section>

    <section class="controls" aria-label="Sketch controls">
      <label for="lengthInput">Wall length</label>
      <div class="length-row">
        <input id="lengthInput" inputmode="decimal" placeholder="e.g. 24.6 or 24' 6\"" />
        <button id="approxBtn" class="secondary">Back-Out Later</button>
      </div>

      <div class="direction-grid">
        <button data-direction="up">↑</button>
        <button data-direction="left">←</button>
        <button data-direction="right">→</button>
        <button data-direction="down">↓</button>
      </div>

      <div class="action-row">
        <button id="undoBtn" class="secondary">Undo</button>
        <button id="finishBtn" class="primary">Finish Structure</button>
      </div>
    </section>
  </main>

  <dialog id="toolsDialog">
    <form method="dialog" class="dialog-card">
      <h2>Tools</h2>
      <button type="button" id="newStructureBtn">New Structure</button>
      <button type="button" id="backOutAreaBtn">Back-Out Area</button>
      <button type="button" id="classifyBtn">Classify Areas</button>
      <button type="button" id="resetBtn" class="danger">Reset Sketch</button>
      <button value="close" class="secondary">Close</button>
    </form>
  </dialog>

  <dialog id="classifyDialog">
    <form method="dialog" class="dialog-card">
      <h2 id="classifyTitle">What area is this?</h2>
      <p id="classifyAreaText"></p>
      <div id="classifyChoices" class="choice-grid"></div>
      <button value="close" class="secondary">Cancel</button>
    </form>
  </dialog>

  <dialog id="backOutDialog">
    <form method="dialog" class="dialog-card">
      <h2>Back-Out Area</h2>
      <p>Tap points around the area on the sketch. Tap the first point again, then choose the area type.</p>
      <div class="choice-grid" id="backOutChoices"></div>
      <button type="button" id="cancelBackOut" class="secondary">Cancel</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
